# SPDX-License-Identifier: MIT
name: Bug report
description: Report a reproducible defect using synthetic data.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, live keys, personal information, or real learner data. Report vulnerabilities privately through SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: Git commit SHA
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Cloudflare deploy button
        - Cloudflare CLI
        - Local Wrangler
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Give minimal steps and synthetic inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
