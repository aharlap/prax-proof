<!DOCTYPE html>
<!-- SPDX-License-Identifier: MIT -->
<!-- Manual test page: pnpm dev, mint a key, fill data-key, open this file's
     content served from any static server (or paste into an html file). -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proof snippet demo — fractions quiz</title>
</head>
<body>
  <h1>Which fraction equals 2/4?</h1>
  <button data-answer="A">A. 1/3</button>
  <button data-answer="B">B. 1/2</button>
  <p id="done" hidden>Recorded. Check your Proof dashboard.</p>

  <script src="http://localhost:8787/p.js"
          data-activity="demo-fractions"
          data-key="PASTE_KEYID:PASTE_SECRET"
          data-identity="ask"></script>
  <script>
    proof.start();
    document.querySelectorAll("button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const correct = btn.dataset.answer === "B";
        proof.answer("q1", { response: btn.dataset.answer, correct });
        proof.finish({ score: correct ? 1 : 0, max: 1 });
        document.getElementById("done").hidden = false;
      });
    });
  </script>
</body>
</html>
